<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-4">
        <div class="mb-3">
            <button class="btn btn-secondary me-2" onclick="window.electronAPI.goHome()">Home</button>
            <button class="btn btn-outline-secondary" onclick="window.electronAPI.openPage('listacliente.html')">Lista
                de fornecedores</button>
        </div>

        <div class="card shadow-sm" style="max-width: 400px;">
            <div class="card-body">
                <h5 class="card-title mb-4">Cadastro de Fornecedores</h5>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nome do cliente" id="name">
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="CPF" id="cpf_cnpj">
                </div>

                <button id="save-button" class="btn btn-primary w-100">Cadastrar Fornecedor</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="fornecedor.js"></script>
</body>

</html>
