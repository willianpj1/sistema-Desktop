<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-5" style="width: 450px;">
        <h1 class="mb-4 text-center">Cadastro de Cliente</h1>

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" placeholder="Digite o nome" />
        </div>

        <div class="mb-3">
            <label class="form-label">CPF</label>
            <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" />
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000" />
        </div>

        <div class="d-grid mt-3">
            <button class="btn btn-primary btn-lg">Cadastrar</button>
        </div>
    </div>

</body>
</html>
