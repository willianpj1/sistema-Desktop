<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-5" style="width: 450px;">
        <h1 class="mb-4 text-center">Cadastro de Produto</h1>

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" placeholder="Digite o nome" />
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <input type="text" id="descricao" class="form-control" placeholder="Digite a descrição" />
        </div>

        <div class="mb-3">
            <label class="form-label">Valor</label>
            <input type="number" id="valor" class="form-control" placeholder="0,00" />
        </div>

        <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" id="quantidade" class="form-control" placeholder="0" />
        </div>

        <div class="d-grid mt-3">
            <button class="btn btn-primary btn-lg">Cadastrar</button>
        </div>
    </div>

</body>
</html>
